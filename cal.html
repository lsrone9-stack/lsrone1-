
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 계산기 에이전트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .calculator-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-3xl p-6 calculator-shadow border border-gray-100">
        <!-- 헤더 -->
        <div class="flex items-center gap-2 mb-6">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-bold text-gray-800">Calculation Agent</h1>
        </div>

        <!-- 디스플레이 -->
        <div class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-200">
            <div id="history" class="text-right text-gray-400 text-sm h-6 overflow-hidden"></div>
            <div id="display" class="text-right text-4xl font-light text-gray-800 overflow-x-auto">0</div>
        </div>

        <!-- 키패드 -->
        <div class="grid grid-cols-4 gap-3">
            <button onclick="clearDisplay()" class="p-4 text-rose-500 font-semibold bg-rose-50 rounded-2xl hover:bg-rose-100">AC</button>
            <button onclick="appendValue('/')" class="p-4 text-gray-600 font-semibold bg-gray-100 rounded-2xl hover:bg-gray-200">/</button>
            <button onclick="appendValue('*')" class="p-4 text-gray-600 font-semibold bg-gray-100 rounded-2xl hover:bg-gray-200">×</button>
            <button onclick="deleteLast()" class="p-4 text-gray-600 font-semibold bg-gray-100 rounded-2xl hover:bg-gray-200">DEL</button>
            
            <button onclick="appendValue('7')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">7</button>
            <button onclick="appendValue('8')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">8</button>
            <button onclick="appendValue('9')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">9</button>
            <button onclick="appendValue('-')" class="p-4 text-gray-600 font-semibold bg-gray-100 rounded-2xl hover:bg-gray-200">-</button>
            
            <button onclick="appendValue('4')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">4</button>
            <button onclick="appendValue('5')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">5</button>
            <button onclick="appendValue('6')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">6</button>
            <button onclick="appendValue('+')" class="p-4 text-gray-600 font-semibold bg-gray-100 rounded-2xl hover:bg-gray-200">+</button>
            
            <button onclick="appendValue('1')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">1</button>
            <button onclick="appendValue('2')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">2</button>
            <button onclick="appendValue('3')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">3</button>
            <button onclick="calculate()" class="p-4 row-span-2 text-white font-bold bg-indigo-600 rounded-2xl hover:bg-indigo-700">=</button>
            
            <button onclick="appendValue('0')" class="col-span-2 p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">0</button>
            <button onclick="appendValue('.')" class="p-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');
        let currentInput = '0';

        function updateDisplay() {
            display.innerText = currentInput;
        }

        function appendValue(val) {
            if (currentInput === '0' && val !== '.') {
                currentInput = val;
            } else {
                currentInput += val;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            history.innerText = '';
            updateDisplay();
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1) || '0';
            updateDisplay();
        }

        function calculate() {
            try {
                history.innerText = currentInput + ' =';
                // 보안을 위해 eval 대신 안전한 수식 파서 로직 사용 권장 (현재는 간략화)
                currentInput = eval(currentInput.replace(/×/g, '*')).toString();
                updateDisplay();
            } catch (e) {
                currentInput = 'Error';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>
</body>
</html>
